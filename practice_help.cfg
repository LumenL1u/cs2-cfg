echo ===================== 详细快捷键 =====================
echo   Alt      - 飞行穿墙
echo   F1       - 重复上一个投掷物
echo   F2       - 消除投掷物效果
echo   F3       - 切换显示本地弹着点
echo   F5       - 一键换爪子刀
echo   F6       - 一键换M9刺刀
echo   F7       - 一键换骷髅匕首
echo   F8       - 一键换蝴蝶刀
echo   F9       - 补甲
echo   \        - 屏蔽闪光效果（完美平台跑图）
echo   Enter    - 回到上一次投掷位置（完美平台跑图）
echo   -        - 添加T BOT并放置
echo   =        - 添加CT BOT并放置
echo   [        - 添加蹲着的BOT（完美平台跑图）
echo   Backspace- 踢出BOT
echo   ]        - BOT蹲下/站立

echo ===================== 小键盘快捷键 =====================
echo   kp_0     - 切换准星透明度(可用于练习屏幕中心感)
echo   kp_1     - 切换伤害倍率(可用于练习压枪)
echo   kp_3     - 切换控制BOT
echo   kp_4     - 控制BOT时切换BOT移动方向
echo   kp_5     - 切换第一人称
echo   kp_6     - 切换第三人称
echo   kp_7     - 一键连跳关
echo   kp_8     - 一键连跳开
echo   kp_9     - 一键换爪子刀